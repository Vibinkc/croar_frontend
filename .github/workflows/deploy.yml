name: Deploy Frontend

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then echo "CRITICAL ERROR: DOCKERHUB_USERNAME is missing from GitHub Secrets!"; exit 1; fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then echo "CRITICAL ERROR: DOCKERHUB_TOKEN is missing from GitHub Secrets!"; exit 1; fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            appxcess/croar_web:latest
            appxcess/croar_web:v0.${{ github.run_number }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL || 'https://api.croar.co' }}
            NEXT_PUBLIC_FRONTEND_DOMAIN=${{ secrets.NEXT_PUBLIC_FRONTEND_DOMAIN || 'app.croar.co' }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID || '1092028128011-v2uittleta4ve4li13snc7mbt22r2k9j.apps.googleusercontent.com' }}
            NEXT_PUBLIC_MS_CLIENT_ID=${{ secrets.NEXT_PUBLIC_MS_CLIENT_ID || 'eda3b961-a69c-41c9-b867-d5af60bd0e06' }}
            NEXT_PUBLIC_MS_TENANT_ID=${{ secrets.NEXT_PUBLIC_MS_TENANT_ID || 'common' }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            export WEB_VERSION=v0.${{ github.run_number }}
            cd ~/croar-app
            
            # Pull the new version
            echo "Pulling latest frontend image..."
            docker-compose pull frontend
            
            # REPLACING OLD VERSION
            # --force-recreate: Replaces containers even if config is same
            # --remove-orphans: Removes old services no longer in the compose file
            echo "Restarting frontend and removing old containers..."
            docker-compose up -d --force-recreate --remove-orphans frontend nginx
            
            # CLEANUP OLD IMAGES
            # Removes dangling images (previous versions that are now untagged)
            echo "Cleaning up old images to save space..."
            docker image prune -f
            
            # Verify Deployment
            echo "Verifying New Deployment..."
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" | grep croar
